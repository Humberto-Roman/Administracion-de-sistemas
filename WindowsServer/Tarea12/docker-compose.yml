version: '3.8'

services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.reprobados.com
    env_file: .env
    environment:
      - ENABLE_FAIL2BAN=1
      - ENABLE_DKIM=1
      - SSL_TYPE=manual
      - SSL_CERT_PATH=/etc/letsencrypt/live/mail.reprobados.com/fullchain.pem
      - SSL_KEY_PATH=/etc/letsencrypt/live/mail.reprobados.com/privkey.pem
      - PERMIT_DOCKER=connected-networks
    volumes:
      - maildata:/var/mail
      - maillogs:/var/log/mail
      - ./nginx/ssl/mail.reprobados.com.crt:/etc/letsencrypt/live/mail.reprobados.com/fullchain.pem:ro
      - ./nginx/ssl/mail.reprobados.com.key:/etc/letsencrypt/live/mail.reprobados.com/privkey.pem:ro
      - ./mailserver/postfix-accounts.cf:/tmp/docker-mailserver/postfix-accounts.cf:ro
    ports:
      - "25:25"
      - "143:143"
      - "465:465"
      - "587:587"
      - "993:993"
    networks:
      - mail_net
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    restart: always

  mariadb:
    image: mariadb:10.11
    container_name: roundcube_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mail_net
    restart: always
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=mariadb
      - ROUNDCUBEMAIL_DB_USER=${MYSQL_USER}
      - ROUNDCUBEMAIL_DB_PASSWORD=${MYSQL_PASSWORD}
      - ROUNDCUBEMAIL_DB_NAME=${MYSQL_DATABASE}
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=587
    volumes:
      - ./roundcube/config/config.inc.php:/var/www/html/config/config.inc.php:ro
    networks:
      - mail_net
    depends_on:
      mariadb:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - mail_net
    depends_on:
      - roundcube
    restart: always

  backup:
    image: alpine:3.19
    container_name: mail_backup
    volumes:
      - maildata:/var/mail:ro
      - ./backups:/backups
      - ./backup.sh:/usr/local/bin/backup.sh:ro
    command: sh -c "apk add --no-cache dcron && echo '0 2 * * * /usr/local/bin/backup.sh' | crontab - && crond -f"
    networks:
      - mail_net
    restart: always

volumes:
  maildata:
  maillogs:
  db_data:
  backup_data:

networks:
  mail_net:
    driver: bridge