server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/ssl/mail.reprobados.com.crt;
    ssl_certificate_key /etc/nginx/ssl/mail.reprobados.com.key;
    location / {
        proxy_pass http://app_web:80;
        proxy_hide_header Server;
    }
}